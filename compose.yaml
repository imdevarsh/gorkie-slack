services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gorkie_db
      POSTGRES_PASSWORD: gorkie
      POSTGRES_USER: gorkie
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gorkie -d gorkie_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
