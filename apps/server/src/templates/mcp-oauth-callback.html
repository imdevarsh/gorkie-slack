<!doctype html>
<html lang="en" class="{{status}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --shadow: 0 2px 4px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.08);
      --text: #1d1d1f;
      --muted: #6e6e73;
    }
    :root.success {
      --accent: #22c55e;
      --accent-bg: rgba(34, 197, 94, 0.08);
    }
    :root.error {
      --accent: #ef4444;
      --accent-bg: rgba(239, 68, 68, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #1c1c1e;
        --border: rgba(255, 255, 255, 0.08);
        --shadow: 0 2px 4px rgba(0, 0, 0, 0.4), 0 8px 32px rgba(0, 0, 0, 0.6);
        --text: #f5f5f7;
        --muted: #98989f;
      }
      :root.success {
        --accent: #4ade80;
        --accent-bg: rgba(74, 222, 128, 0.1);
      }
      :root.error {
        --accent: #f87171;
        --accent-bg: rgba(248, 113, 113, 0.1);
      }
    }
    body {
      display: grid;
      place-items: center;
      min-height: 100dvh;
      padding: 24px;
      font-family:
        -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
        sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      background: var(--bg);
    }
    main {
      width: min(440px, 100%);
      padding: 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }
    .badge {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      padding: 5px 12px 5px 8px;
      margin-bottom: 24px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--accent-bg);
      border-radius: 999px;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">{{ icon }}{{ badge }}</div>
      <h1>{{ title }}</h1>
      <p>{{ message }}</p>
    </main>
  </body>
</html>
